<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTGM SFX Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --bg-dark: #020617;
            --card-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #0c4a6e, #020617);
            color: #f8fafc;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        /* Search Bar Styling */
        .search-container {
            display: flex;
            gap: 12px;
            background: var(--card-bg);
            padding: 8px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            margin-bottom: 40px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 20px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        button {
            background: var(--primary);
            color: #020617;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            background: #7dd3fc;
        }

        /* Sound Grid */
        .sound-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .sound-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sound-card:hover {
            border-color: var(--primary);
            transform: scale(1.02);
        }

        .sound-info {
            margin-bottom: 15px;
        }

        .sound-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: #e2e8f0;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        audio {
            width: 100%;
            height: 35px;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5); /* Makes player match blue theme */
        }

        /* Loader */
        #loader {
            display: none;
            text-align: center;
            padding: 50px;
            font-weight: 600;
            color: var(--primary);
        }

        footer {
            margin-top: 60px;
            text-align: center;
            border-top: 1px solid var(--glass-border);
            padding-top: 30px;
        }

        .social-links a {
            color: #94a3b8;
            text-decoration: none;
            margin: 0 10px;
            font-size: 0.85rem;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>FTGM SFX EXPLORER</h1>
            <p style="color: #94a3b8;">High Quality Sound Effects Engine</p>
        </header>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search sounds (e.g. cinematic, glitch, drums)..." value="drums">
            <button id="searchBtn">SEARCH</button>
        </div>

        <div id="loader">Fetching sounds from FTGM API...</div>
        <div id="results" class="sound-grid"></div>

        <footer>
            <div class="social-links" id="apiCredits">
                </div>
        </footer>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsGrid = document.getElementById('results');
        const loader = document.getElementById('loader');
        const creditsDiv = document.getElementById('apiCredits');

        // Note: This matches your Vercel deployment URL
        const BASE_API_URL = "https://ftgm-sfx-api.vercel.app/api/search";

        async function fetchSounds() {
            const query = searchInput.value || 'drums';
            const url = `${BASE_API_URL}?q=${query}`;

            // Reset UI
            resultsGrid.innerHTML = '';
            loader.style.display = 'block';

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.error) {
                    resultsGrid.innerHTML = `<p style="color: #f87171; grid-column: 1/-1; text-align: center;">${data.error}</p>`;
                } else {
                    displayResults(data.results);
                    updateCredits(data.credits);
                }
            } catch (err) {
                resultsGrid.innerHTML = `<p style="color: #f87171; grid-column: 1/-1; text-align: center;">Connection Failed. Make sure you are on ${window.location.hostname}</p>`;
            } finally {
                loader.style.display = 'none';
            }
        }

        function displayResults(sounds) {
            if (!sounds || sounds.length === 0) {
                resultsGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">No sounds found.</p>';
                return;
            }

            sounds.forEach(sound => {
                const card = document.createElement('div');
                card.className = 'sound-card';
                card.innerHTML = `
                    <div class="sound-info">
                        <p class="sound-title" title="${sound.name}">${sound.name}</p>
                    </div>
                    <audio controls preload="none">
                        <source src="${sound.previews['preview-hq-mp3']}" type="audio/mpeg">
                    </audio>
                `;
                resultsGrid.appendChild(card);
            });
        }

        function updateCredits(credits) {
            if (!credits) return;
            creditsDiv.innerHTML = `
                <a href="${credits.youtube}" target="_blank">YouTube</a> |
                <a href="${credits.tiktok}" target="_blank">TikTok</a> |
                <a href="${credits.telegram}" target="_blank">Telegram</a> |
                <a href="${credits.whatsapp_channel}" target="_blank">WhatsApp</a> |
                <a href="${credits.contact}" target="_blank">Contact</a>
            `;
        }

        // Event Listeners
        searchBtn.addEventListener('click', fetchSounds);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchSounds();
        });

        // Initial Load
        window.onload = fetchSounds;
    </script>
</body>
</html>
